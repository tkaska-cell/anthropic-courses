const categoryMap = {
  "Claude Code": { class: "tag-claude-code", filter: "Claude Code" },
  "モデル": { class: "tag-model", filter: "model" },
  "Claude機能": { class: "tag-feature", filter: "feature" },
  "開発者向け": { class: "tag-dev", filter: "dev" },
  "MCP・連携": { class: "tag-mcp", filter: "mcp" },
  "ユースケース": { class: "tag-usecase", filter: "usecase" },
  "安全性・研究": { class: "tag-safety", filter: "safety" },
  "教育": { class: "tag-edu", filter: "edu" },
  "入門ガイド": { class: "tag-guide", filter: "guide" },
  "ブランド": { class: "tag-brand", filter: "brand" },
  "研究・実験": { class: "tag-experiment", filter: "experiment" },
};

let currentFilter = "all";
let searchQuery = "";

function getTagHTML(category) {
  const info = categoryMap[category] || { class: "tag-feature", filter: "other" };
  return `<span class="card-tag ${info.class}">${category}</span>`;
}

function getDriveVideoURL(filename) {
  const id = DRIVE_FILES[filename];
  if (id) return `https://drive.google.com/file/d/${id}/preview`;
  return null;
}

function getDriveOpenURL(filename) {
  const id = DRIVE_FILES[filename];
  if (id) return `https://drive.google.com/file/d/${id}/view`;
  return null;
}

function renderVideos() {
  const list = document.getElementById("video-list");
  const noResults = document.getElementById("no-results");
  list.innerHTML = "";

  const filtered = VIDEOS.filter(v => {
    const catInfo = categoryMap[v.category];
    const matchFilter = currentFilter === "all" || (catInfo && catInfo.filter === currentFilter);
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      v.title.toLowerCase().includes(q) ||
      v.title_ja.toLowerCase().includes(q) ||
      v.summary.toLowerCase().includes(q) ||
      v.category.toLowerCase().includes(q) ||
      v.date.includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById("filtered-count").textContent = filtered.length;

  if (filtered.length === 0) {
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  filtered.forEach((v, idx) => {
    const driveURL = getDriveVideoURL(v.filename);
    const openURL = getDriveOpenURL(v.filename);
    const card = document.createElement("div");
    card.className = "video-card";
    card.innerHTML = `
      <div class="card-header">
        <div class="card-date">${v.date}</div>
        <div class="card-body">
          <div class="card-title">${v.title_ja}</div>
          <div class="card-title-en">${v.title}</div>
          ${getTagHTML(v.category)}
          <div class="card-summary">${v.summary}</div>
          <div class="card-player" id="player-${idx}">
            ${driveURL
              ? `<iframe src="" data-src="${driveURL}" width="100%" height="400" style="border:none;border-radius:8px;" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
              : `<p style="color:var(--text2);font-size:0.85rem;padding:1rem 0;">Google Driveでファイルを開いて視聴してください。</p>`
            }
            ${openURL
              ? `<a href="${openURL}" target="_blank" class="drive-link">&#9654; Google Driveで開く</a>`
              : ``
            }
          </div>
        </div>
      </div>
    `;
    card.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const player = card.querySelector(".card-player");
      const wasVisible = player.classList.contains("visible");
      // Close all others
      document.querySelectorAll(".card-player.visible").forEach(p => {
        p.classList.remove("visible");
        p.closest(".video-card").classList.remove("expanded");
        const iframe = p.querySelector("iframe");
        if (iframe) iframe.src = "";
      });
      if (!wasVisible) {
        player.classList.add("visible");
        card.classList.add("expanded");
        const iframe = player.querySelector("iframe");
        if (iframe && iframe.dataset.src) iframe.src = iframe.dataset.src;
      }
    });
    list.appendChild(card);
  });
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderVideos();
  });
});

// Search
document.getElementById("search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  renderVideos();
});

renderVideos();
</script>
