日では、人間と AI モデルの組み合わせが必要です。明日は AI モデルだけが必要になる可能性があります。 AI の影響はソフトウェアだけにとどまりません。それらはハードウェアや物理的な世界にも存在することになります。", "transcript_en": "[Music] Today, a lot of the emphasis is on how frontier AI models are transforming software engineering. What we're interested in understanding is how that can begin to translate into the physical world. >> Robotics is sort of the clear entry point to how you have a mostly software system start having the ability to reach out into the real world. Project Fetch is this self-contained experiment where we wanted to measure how much does Claude accelerate humans performing a fairly sophisticated technical task that they do not have experience with. >> Project fetch was a one-day experiment. >> The experiment was three phases. All of these tasks were shaped approximately like get this robot dog to fetch a beach ball. There were two teams. These teams were comprised of software engineers and research engineers at Enthropic that had hardly any robotics experience. One team had access to Claude and the other team didn't. >> Phase one was very simple. It was to use the pre-provided controllers to get the dog to walk out to a beach ball and bring it back to where it started. >> Oh, hey. All right. Seems pretty intuitive. Here we go. And where are we supposed to bring it? Over by the bone. >> Yeah, I think >> I think the team with Claude took about seven minutes. >> All right, go attack that team now. Go attack their dog. >> Charge. Oh shoot, guys. They're destroying us. >> Oh my god. Wait, we're getting we're getting destroyed. What? >> The team without claw, I think, took 10 minutes. >> Oh, sorry. It's going to hit you. >> All right, I'm going to do a victory dance. Phase two was also a game of fetch, but this time the teams had to program their own controller. >> You have to like actually get access to the hardware and design uh a program that you can like write on your laptop that will control the dog. >> Claude just like one shoted a hole. >> All right. Controller. >> I'll do some calisthenics. >> Nice. Nice. Is is this for Oh, this is just control. >> This is just control. So that's all we need. I guess >> this is from the official ROS 2 SDK. >> Um, and I got this installed, but then it's asking for like a whole bunch of other packages, and that's all failing. >> I've never really understood how reliant I am on cloud doing the manual work, finding all the nitty-gritty details I don't want to have to figure out. >> Can't be we can't we can't get nervous about them. >> You know what? I'm just going to install pimp from the actual container later. So Oh, wait. No, I can't. >> I know. No, I'm patient. It's been over a minute. >> One of the primary bottlenecks of the experiment is that you have this hardware. You have this complicated piece of technology. You have your laptop and you have to like get your laptop talking to this hardware. >> All right. I'm um setting my claw up to uh create a dog server that all of our computers can connect to to like see what the dog is seeing. And >> Oh, nice. >> There are many different software libraries on the internet for communicating with this particular robot. And Cloud found these things for them. It installed the right things on their computer and it pretty quickly got them access to the dock. >> Oh >> Okay. >> So fast. >> Oh, watch out. Yeah. Careful now. Try not to run into the table. >> Okay. I will. >> Turn around. >> I'm calling this. Turn it off. [Music] >> Stop. Stop. Stop. >> Stop. Stop. Stop. Stop. >> I think that team should be disqualified for hitting another participant. >> The team with Claude finished phase 2 in about 2 hours and 15 minutes. >> Probably the area where we saw the most uplift from Claude was just in the task of connecting to the robot. We think that's really important because it is in fact difficult for anyone to identify an arbitrary piece of hardware in the world and figure out how to talk to it and how to control it. >> I think they got their camera. I saw >> they got their camera working. >> Yeah. >> Was cloud even helpful for this part or we just are we slow? >> Yeah. >> Yeah. We're not getting very far, but that's okay. It's a It's a learning experience. >> The team without Claude really struggled with this and went down a lot of different paths, none of which were especially successful. >> And we we basically had to intervene and be like, \"All right, here here is a strategy that we know works. Start from there, and then this will unlock kind of the rest of the phase and the rest of the experiment for them.\" >> Nice. >> Oh, great. >> Um, Daniel/Molio. >> Daniel or seven. [Music] Phase three of the experiment was a greater degree of autonomy. The task in phase three was to write a program that would get the dog to fetch a beach ball all by itself. Essentially just press go and have the robot search around, detect the location of the ball, walk to the ball, and bring it back all autonomously. And this is like ratcheting up in difficulty kind of by design, but also gesturing at like the real problem that we expect Frontier models having to solve in the future is essentially this kind of autonomous version where like if a Frontier model wants a robot to do something for it, it needs to be able to solve this very hard problem. The team without Claude in phase three did a good job of the initial task of coming up with a way to track the location of the robot in space. They made progress on the task of detecting the ball, but they didn't really come close to knitting everything together. >> I miss caught so much. The team with Claude actually came fairly close to finishing phase three. I think by the end, the team with Claude was maybe an hour and a half away from being done. The results of the experiment were essentially that the team with Claude completed all of the things that they did complete in a couple of hours faster than the team without Claude. In the near term, we think that AI models are going to do exactly what we showed in this experiment, which is making it easier for people without a lot of robotics experience to engage meaningfully with robots. Just with this one tool we have, we've dramatically accelerated their ability to do things with this robot. We didn't go like train claw to uplift humans do robotics tasks. This is just a thing that fell out of this technology. And then maybe like in the long run this is kind of a a leading indicator of where the whole the whole system is going. >> What today requires the combination of a person and an AI model. Tomorrow is likely to just require the AI model. The effects of AI are not just going to be in software. They are going to be in hardware and in the physical world as well."}, {"filename": "20251114_Accelerating private equity deal flows with Claude", "date": "2025/11/14", "title": "Accelerating private equity deal flows with Claude", "title_ja": "Claudeでプライベートエクイティのディールフローを加速", "category": "ユースケース", "summary": "PEのディールフローをClaudeで数日→数時間に短縮するデモ。売り手側のティーザー作成、買い手側のLBOモデル構築をClaudeのスキル機能で自動化。SharePointやIgniteとの連携で実務に即した活用例を紹介。", "duration_type": "short", "transcript_ja": "クロードがどのようにプライベート・エクイティ取引の流れを数日から数時間に加速させたかを見てみましょう。私たちは、売り手側の Riverside Partners のアソシエイトである Sarah と、買い手側の Wealth Capital の副社長である Jen を追っていきます。彼らは、8,500 万ドルのヘルスケア サービス ビジネスである Horizo​​n Health Group に取り組んでいます。サラは取引ティーザーが必要で、クロードに取引ティーザー スキルを使用してクライアント向けのプレゼンテーションを作成するように依頼します。クロードは Ignite を検索し、財務データ、顧客分析データ、運用データを見つけて、収益、利益率、保持指標、施設の詳細を抽出します。 2 分以内に、サラはプロ仕様のティーザーを送信する準備ができました。ティーザーがジェンの受信箱に届きました。彼女はクロードに、それをスクリーニングし、LBO スキルを使用してレバレッジ バイオ モデルを構築するように依頼しました。クロードは SharePoint から投資基準を取得し、ティーザーからデータを抽出します。数分以内に、ジェンは包括的な検査メモを受け取り、Horizo​​n Health がすべての項目にチェックを入れているようであることを確認しました。しかし、クロウはさらに熱心に取り組んでいます。 Ignite データ ルームを検索すると、Blue Cross Regional が 2025 年 12 月に期限切れとなる契約で収益の 18% を占めていることがわかります。収益の 28% には短期契約解除条項が付いています。これは一見しただけでは気づかなかったリスクです。評決は条件付きパス。ブルークラッシュの更新はロックダウンする必要があります。ジェンは数字を見てみましょう。クロードは、アナリストであれば数時間かかるであろう完全なモデルを数分で構築しました。購入価格は IBIDA の 11 倍、レバレッジは 5 倍、5 年間のキャッシュ フロー予測と負債償却が伴います。基本ケースでは上向き。基本ケースでは、IR は 26%、資金倍率は 3 倍で 20% のハードルを大きく上回っています。ジェンはクロードとストレス テストを行い、Excel にマイナス面のケースを追加するよう依頼します。クロードはすぐに、より低い成長率と利益率を想定した新しいシナリオを構築します。 Jen は Claw の作業をリアルタイムで確認し、その仮定を検証します。下降局面では、しきい値で 19% の IR が発生します。次に、彼女は感度分析を求めます。クラブは8回から12回退場までのマトリックスを構築。 10 回では、数値はモデルと正確に一致します。 8倍でも返品は許容範囲です。結果のファンは良さそうです。今は月曜の朝、ジェンは数時間後に投資委員会の会議があります。彼女はクロウに、推薦状とともにすべてを統合するよう依頼した。数分で、ジェンは IBIDA の 10 ～ 11 倍で意向表明を進めるよう勧告が記載された投資委員会の資料を受け取りました。クロードは契約リスクをプレオイド条件としてフラグを立てます。基本ケースでは 26% の IR が発生し、マイナス面は 19% です。ブルークロスがロックダウンされている場合は LOI 推奨 11 回、ロックダウンされていない場合は離陸復帰。サラはデータ ルームからティーザーまで 2 分で移動しました。ジェンは 48 時間以内に投資推奨のティーザーを作成しました。クロードは、データ ルームのファイルを読んで重大な契約リスクを発見し、契約がまだ有効であることを数値化しました。これはより良い勤勉性をより迅速に発揮します。", "transcript_en": "Let's look at how Claude accelerates private equity deal flow from days to hours. We'll follow Sarah, an associate at Riverside Partners, on the sell side, and Jen, a VP at Wealth Capital on the buy side. They're working on Horizon Health Group, an $85 million healthcare services business. Sarah needs a deal teaser and asks Claude to create a client ready presentation using the deal teaser skill. Claude searches Ignite, finding financials, customer analysis, and operations data, and extracting revenue, margins, retention metrics, and facility details. In under 2 minutes, Sarah's got a professional teaser ready to send. The teaser lands in Jen's inbox. She asked Claude to screen it and build a leverage bio model using the LBO skill. Claude pulls from SharePoint for investment criteria and extracts data from the teaser. Within minutes, Jen gets a comprehensive screening memo and sees that Horizon Health seems to check all the boxes. But Claw does deeper diligence. It searches the Ignite data room to find that Blue Cross regional is 18% of revenue with a contract that expires December 2025. 28% of revenue has short-term termination clauses. This is risk that wouldn't have been picked up at a glance. The verdict conditional pass. The blue crush renewal needs to be locked down. Now Jen looks at the numbers. Claude built a complete model in minutes which would have taken an analyst hours. Purchase price at 11 times IBIDA, five times leverage with 5year cash flow projections and a debt amortization. An upside in base case. Base case shows 26% IR and three times money multiple well above the 20% hurdle. Jen stress tests with Claude, asking to add a downside case in Excel. Claude immediately builds a new scenario with lower growth and margin assumptions. Jen sees Claw's work in real time and validates its assumptions. Downside yields a 19% IR right at threshold. Then she asks for sensitivity analysis. Club builds a matrix eight time to 12 time exits. At 10 times, the numbers tie exactly to the model. Even at eight times, the returns are acceptable. The fan of outcomes look good. It's Monday morning, and Jen has an investment committee meeting in a few hours. She asked Claw to synthesize everything with a letter of intent recommendation. In minutes, Jen receives an investment committee deck with a recommendation to proceed with a letter of intent at 10 to 11 times IBIDA. Claude flags contract risks as preoi conditions. Base case generates 26% IR downside 19%. LOI recommendation 11 times if Blue Cross is locked down, takeoff return if not. Sarah went from data room to teaser in 2 minutes. Jen took a teaser to an investment recommendation in 48 hours. Claude caught a material contract risk by reading the data room files, then quantify the deal still works. This is better diligence faster."}, {"filename": "20251114_Claude Code modernizes a legacy COBOL codebase", "date": "2025/11/14", "title": "Claude Code modernizes a legacy COBOL codebase", "title_ja": "Claude CodeでレガシーCOBOLコードベースを近代化", "category": "Claude Code", "summary": "Claude Codeを使ってCOBOLの旧システムをモダナイズするデモ。約100ファイルのクレジットカード管理システムを対象に、ドキュメント未整備のレガシーコードの発見・文書化・翻訳をサブエージェントで実行。", "duration_type": "medium", "transcript_ja": "開発者が Cloud Code を使用して Cobalt コードベースを最新化する方法を見てみましょう。このデモでは、AWS のメインフレーム最新化デモ リポジトリを使用します。これは、Cobalt プログラム、コピー ブック、JCL スクリプトなど、約 100 個のファイルを含む中規模のクレジット カード管理システムです。フェーズ 1、検出と文書化。私たちのサンプル Cobalt コードベースにはドキュメントがほとんどありません。もちろん、これは、重要なビジネス ロジックや規制要件が文書化されていないコード内に埋め込まれている従来のコード ベースでは一般的です。コードを書いた開発者はずっと前に組織を離れており、Cobalt に精通した開発者を雇用するのは困難です。まず、cloud code/aent コマンドを使用して特殊なサブエージェントを作成します。これは、Cobalt ドキュメントの翻訳専門家でした。サブエージェントはクラウド コードによって並行して呼び出すことができ、メイン スレッドの汚染を避けるために独自の分離されたコンテキスト ウィンドウで動作します。思考モードを有効にし、クラウド コードにコードベースのアーキテクチャを分析するように依頼しました。クラウド コードは 94 個すべてのファイルの ToDo リストを作成し、その進行状況を追跡して、ファイルが 2 回処理されず、何も見逃されていないことを確認しました。クロードが作成したドキュメントは、単純なコード コメントを超えたものでした。たとえば、利息計算プログラム CBAC4C を見てみましょう。これは、プログラムがどのように取引カテゴリの残高を読み取り、口座グループごとに金利を検索し、フォールバック金利のビジネス ルールを適用し、口座レコードを更新するかという完全なビジネス ワークフローを抽出しました。クロードはこれをファイルごとに行いましたが、プレーン テキストとして 2 つのメモリ ファイルも作成しました。 Catalog.ext テキストは、CBAC04C のような不可解な名前を利息計算バッチ プログラムに変換します。 relationship.ext は、単純なパイプ区切り形式を使用してすべての依存関係をマップします。これらのインデックスを使用して、クロードは人魚図を生成しました。これは、取引入力から転記利息計算、そして最終的に顧客明細書までデータがどのように流れるかを示す、毎日のバッチ処理ワークフローの完全なマップです。このデモでは、Cloud Code を 1 時間継続的に実行して、100 ページを超えるドキュメントの下書きを作成しました。しかし、Claude Code は 30 時間以上自律的に実行することができ、ここで使用されている技術は、はるかに大規模なコード ベースに拡張できます。フェーズ 2、移行と検証。 Cobalt コードベースを徹底的に文書化した後、私たちはクロードにそのコア機能の 1 つを Java に移行するよう依頼しました。クロードがファイルを早まって編集することなく移行戦略全体を検討できるように、計画モードに切り替えました。クロードは、以前は CBAC4C として知られていたプログラムを分析し、改行処理や複数ファイルの調整などの複雑なコバルト パターンを特定しました。クロードは、この機能について 5 つのフェーズからなる移行計画を作成しました。 1 つ目は、プロジェクト構造を作成することです。 2 つ目は、データ モデルをコピーブックから Java クラスに変換することです。 3、元のファイル形式と互換性のある IO 層を構築します。 4 つ目は、Cobalt 固有の動作を維持しながらビジネス ロジックを変換することです。最後に、デュアル テスト ハーネスを作成します。 1 つは元のコードベースに GNU Cobalt 3.2.0 を使用し、もう 1 つは Java 17 を使用しました。結果として得られる Java コードは、単純な構文変換を超えています。クロードは、適切な設計パターン、エラー処理、およびロギングを備えた適切な Java クラスを作成しました。現代の開発チームが実際に保守する慣用的な Java。次に、新しい Java コードが置き換え対象の Cobalt コードと同じように動作することを確認する検証が行われました。クロードは複数のテスト データ ファイルを作成し、元の Cobalt プログラムと新しいプログラムの両方に対してそれらを実行しました。検証では、最終出力だけでなく、中間計算、ファイルの権利、データ変換も比較されました。その結果、完璧なビットフォービット忠実度が得られました。すべての計算、ビジネス ルール、およびエッジ ケースが保存されました。もちろん、このデモ アプリケーションは従来の Cobalt コードベースよりもはるかに小さいですが、ここでのテクニックはすべてスケーラブルです。 Claude Code を使用すると、開発者は、わずか 12 か月前には不可能だった自信と効率を持ってコード ベースを最新化できるようになります。", "transcript_en": "Let's explore how developers can use Cloud Code to modernize a Cobalt codebase. For the purposes of this demo, we'll use AWS's mainframe modernization demo repository. This is a medium-siz credit card management system with around 100 files, including Cobalt programs, copy books, and JCL scripts. Phase one, discovery and documentation. Our sample Cobalt codebase has almost no documentation. This is of course common with legacy code bases where critical business logic and regulatory requirements are embedded within undocumented code. The developers who wrote the code have long since left the organization and developers familiar with Cobalt are hard to hire. We first create a specialized sub aent using cloud code/ aent command. This was our Cobalt documentation expert in translator. Sub aents can be invoked by cloud code in parallel and they operate with their own isolated context windows to avoid polluting the main thread. We enabled thinking mode and asked cloud code to analyze the architecture of the codebase. Cloud code created a to-do list of all 94 files and tracked its progress to ensure no files were processed twice and nothing was missed. The documentation Claude produced went beyond simple code comments. For example, let's look at the interest calculation program CBAC4C. It extracted the complete business workflow, how the program reads transaction category balances, looks up interest rates by account group, applies business rules for fallback rates, and updates account records. Claude did this for each file, but also created two memory files as plain text. Catalog.ext text translates cryptic names like CBAC04C into interest calculator batch program relationships.ext maps every dependency using a simple pipe delimited format. Using these indices, Claude then generated mermaid diagrams, a complete map of the daily batch processing workflow showing how the data flows from transaction input through posting interest calculation and finally to customer statements. In this demo, Cloud Code ran continuously for an hour to draft over 100 pages of documentation. But Claude Code is capable of running for over 30 hours autonomously, and the techniques used here scale to much, much larger code bases. Phase 2, migration and verification. After thoroughly documenting the Cobalt codebase, we asked Claude to migrate one of its core features to Java. We switched to planning mode to ensure Claude would think through the entire migration strategy without prematurely editing files. Claude analyzed the program formerly known as CBAC4C and identified complex cobalt patterns like line break processing and multifile coordination. Claude developed a migration plan for this feature with five phases. One, create the project structure. Two, translate data models from copy books to Java classes. Three, build the IO layer compatible with the original file formats. Four, convert business logic while preserving Cobalt specific behaviors. And finally, create a dual test harness. One using GNU Cobalt 3.2.0 for the original codebase and one in Java 17. The resulting Java code went beyond a simple syntax translation. Claude created proper Java classes with appropriate design patterns, error handling, and logging. idiomatic Java that a modern development team would actually maintain. Next was verification to ensure that the new Java code worked the same as the Cobalt code it was replacing. Claude created multiple test data files and ran them against both the original Cobalt and the new programs. The verification compared not just final outputs but intermediate calculations, file rights and data transformations. The result was perfect bit forbit fidelity. Every calculation, business rule, and edge case was preserved. Of course, this demo application is far smaller than your legacy Cobalt codebases, but all the techniques here are scalable. Claude Code will empower your developers to modernize code bases with confidence and efficiency that simply would have been impossible just 12 months ago."}, {"filename": "20251114_Generating real-time credit intelligence with Claude", "date": "2025/11/14", "title": "Generating real-time credit intelligence with Claude", "title_ja": "Claudeでリアルタイムクレジットインテリジェンスを生成", "category": "ユースケース", "summary": "クレジットアナリストがClaudeを使って市場シグナルから投資判断まで数分で到達するデモ。Walmart債券の分析を例に、LSCGデータ連携、インタラクティブダッシュボード、競合比較を即座に実行。", "duration_type": "short", "transcript_ja": "クロードが信用アナリストを数時間ではなく数分で市場シグナルから投資判断に移すのにどのように役立つかを説明しましょう。私たちは、マルチ戦略ファンド、Steady Capital の信用アナリスト、Yuri を追っています。午前 10 時になり、彼はウォルマート 2030 債券が緊迫していることに気づきました。ポートフォリオレビューは午後2時です。ユーリは、これは取引の機会なのか、それとも根本的な変化なのかを知りたいと考えています。彼は単純に始めます。ウォルマートの債券曲線を見せて、コストコやターゲットと比較してください。クローはLSCGに接続します。数秒以内に、インタラクティブなダッシュボードが完成します。ここでは、ライブ データを含む完全な WMA 曲線が表示されます。 2030 年は厳しいですが、2037 年と 2038 年に向けて急激に伸びます。市場はより長期にわたる補償を望んでいます。クロードはコストコとターゲットのコンプを自動的に取得し、ウォルマートは両社よりも厳しい取引を行っています。 1 分以内に、ユーリはウォルマートの価格がクラス最高であることに気づきました。さて、ファンダメンタルズはそれを裏付けていますか？ユーリはクロードに「ウォルマートの信用力をもっと深く調べてください。過去3回の決算報告を分析してください。サードブリッジの専門家を調べて、私に報告してください。」と尋ねました。クロードはエラーの収益記録を取得します。 Q4、Q1、Q2。サード・ブリッジでウォルマートの元幹部を探している間、すべてが並行して起こります。数分以内に、クロードは完全な信用分析を準備できます。その結果、4 分の 3 にわたってパターンが見つかりました。一貫した売上成長。電子商取引が急増しています。広告は 50% 近く増加し、利益率の高い新しいビジネスが拡大しています。すべての主張は、Arrow のプラットフォームに直接アクセスできるリンクで検証可能です。クラウドが分析した正確な記録。クロードは、これらのシステムを実際に構築した元幹部を見つけました。電子商取引の収益性の話を裏付けるものもあります。別の者は、料金に関する競争上の優位性を説明しています。サプライヤーとの関係と国内調達により、企業は構造的に保護されています。クロードはすべてを合成します。これは一時的なものではなく傾向です。強力な実行の 3 つの要素、専門家はそれが本物であることを確認しています。すべてのデータ ポイントがソースにリンクされている場合、時刻は午後 1 時 45 分です。ユーリは、ダッシュボードを使用してポートフォリオのレビューを開始し、包括的な詳細を調べます。話は明らかです。市場はウォルマートをクラス最高の企業として評価しており、ファンダメンタルズがそれを裏付けている。条項の見方: この変革が続けば、短期債は完璧な価格設定となり、長期債はより高い価値を提供します。 30 分、3 つのプラットフォーム、完全に透明な 1 つのストーリー。それがデータと確信の違いです。", "transcript_en": "Let me show you how Claude helps credit analysts move from market signal to investment decision in minutes, not hours. We're following Yuri, a credit analyst at a multistrategy fund, Steady Capital. It's 10:00 a.m. and he notices the Walmart 2030 bonds moving tighter. Portfolio review is at 2 p.m. Yuri wants to know, is this a trading opportunity or fundamental shift? He starts simple. Show me Walmart's bond curve and compare it to Costco and Target. Claw connects to LSCG. Within seconds, an interactive dashboard is ready. Here we sees full WMA curve with live data. The 2030 is tight, but there's a steep jump out to 2037 and 2038. The market wants compensation for a longer duration. Claude automatically pulls comps for Costco and Target, and Walmart trades tighter than both of them. In under a minute, Yuri sees that Walmart is priced as best-in-class. Now, do the fundamentals support it? Yuri asked Claude, \"Dig deeper on Walmart's credit quality. Analyze last three earnings calls. Check Third Bridge experts and give me a write up.\" Claude pulls error earnings transcripts. Q4, Q1, Q2. While searching Third Bridge for former Walmart execs, everything happens in parallel. Within minutes, Claude has a complete credit analysis ready. It found patterns across three quarters. Consistent sales growth. E-commerce is surging. Advertising is up nearly 50% and new high margin businesses are scaling. Every claim is verifiable with links that go directly to Arrow's platform. An exact transcript Cloud analyzed. Claude found former execs who actually built these systems. One confirms the e-commerce profitability story. Another explains their competitive advantage on tariffs. Supplier relationships and domestic sourcing give them structural protection. Claude synthesizes everything. This is a trend, not a blip. Threearters of strong execution, experts confirming it's real. With every data point linked source, it's 1:45 p.m. Yuri walks into the portfolio review with his dashboard and comprehensive deep dive. The story is clear. The market is pricing Walmart as best- higher than any human ever has. It's also much better at front end. It's way better at vision, and that makes it a lot better at [music] using computers. Opus 4.5 is available today. For the first time, it's on every [music] major cloud platform. Let us know what you think."}, {"filename": "20251126_Claude Agent Skills Explained", "date": "2025/11/26", "title": "Claude Agent Skills Explained", "title_ja": "Claudeエージェントスキル解説", "category": "Claude Code", "summary": "エージェントスキルの仕組みを詳しく解説。スキルはドメイン知識をパッケージ化したフォルダで、起動時に名前と説明だけをロード（30-50トークン）。ユーザーのプロンプトに応じて必要なskill.mdを動的にコンテキストに読み込む。Claude Code、API、claude.aiで横断的に使用可能。", "duration_type": "medium", "transcript_ja": "こんにちは、私の名前はオットーです。このビデオではエージェントのスキルについて説明します。今日のエージェントは非常に賢いですが、実際の仕事に必要な専門知識を常に持っているわけではなく、スキルが問題の解決に役立ちます。スキルは、当面のタスクに関連する場合にクラウドが自動的に呼び出せる専門知識をパッケージ化した、整理されたフォルダーと考えることができます。そして最も重要なことは、これらのスキルはクラウド コード、API、cla.ai 全体で移植可能であるということです。また、スキルの動作方法は、起動時に、インストールされているすべてのスキルの名前と説明のみがシステム プロンプトに読み込まれます。これにより、スキルごとに約 30 ～ 50 トークンが消費され、クロードにスキルの存在を認識させることになります。次に、ユーザー プロンプトがスキルの説明と一致すると、クロードは完全な skill.md ファイルをコンテキストに動的にロードします。最後に、スキルが他のファイルまたはスクリプトを参照している場合、それらも徐々にロードされ、必要に応じて実行されます。この漸進的な開示により、コンテキスト ウィンドウを肥大化させることなく、複雑なタスクを実行するためのさまざまなスキルをインストールできるようになります。しかし、スキルがクロードの他の機能とどのように適合するかを見てみましょう。スキルがクロードに特殊なタスクの実行方法を教える一方で、Claude.md ファイルは特定のプロジェクトについてクロードに伝えます。テキストスタック、コーディング規約、リポジトリ構造などです。 CloudMD ファイルはリポジトリ内のコードと一緒に存在します。 CloudMD ファイルには、[音楽] では Nex.js JS と Tailwind を使用しているような内容が記載されている場合があります。しかし一方で、スキルは、あらゆるプロジェクトにわたって機能する移植可能な専門知識です。したがって、フロントエンド デザイン スキルによって、タイポグラフィ標準、アニメーション パターン、レイアウト規則をクロードに教えることができ、UI コンポーネントを構築するときに [音楽] が自動的にアクティブになります。一方、MCP サーバーは、Claude を GitHub、linear、Postgress などの外部コンテキスト ソースに接続する単一プロトコルであるユニバーサル統合を提供します。 MCP はデータに接続します。スキルはクロードにそれをどう扱うかを教えます。したがって、MCP サーバーはクロードにデータベースへのアクセスを許可しますが、データベース クエリ スキルを使用すると、チームのクエリ最適化パターンをクロードに教えることができます。最後に、サブエージェントは、役割が固定された特殊な AI アシスタントです。各サブエージェントには、独自のコンテキスト ウィンドウ、カスタム プロンプト、および特定のツール権限があります。スキルは、あらゆるエージェントが使用できるポータブルな専門知識を提供します。したがって、フロントエンド開発者のサブエージェントはコンポーネント パターン スキルを使用できます。一方、UI レビュー担当者のサブエージェントはデザイン システム スキルを使用できますが、どちらも同じアクセシビリティ標準スキルをロードして使用できます。そして最も重要な点は、これらの機能が連携して動作するように設計されていることです。 CloudMD ファイルは基礎を設定します。 MCP [音楽] サーバーがデータを接続します。サブエージェントはそれぞれの役割とスキルに特化しており、専門知識をもたらし、すべての部分をよりスマートでより機能的にします。最終的には、スキルを使用すると、チームのコーディング標準に合わせて新入社員を導入したり、すべての PR が特定のセキュリティのベスト プラクティスに従うようにしたり、チーム全体でデータ分析手法を共有したりするなど、ワークフローを再利用可能な機能にパッケージ化できます。これが、スキルがクロードでより多くのことを達成するのに役立つ方法です。ぜひ試してみて、ワークフローがどのように改善されるかを確認することをお勧めします。", "transcript_en": "Hi, my name is Otto and in this video we're going to discuss agent skills. Agents today are pretty intelligent, but they don't always have the domain expertise you need for real work and skills help solve this. You can think of skills as organized folders that package expertise that Cloud can automatically invoke when relevant to the task at hand. And most importantly, these skills are portable across cloud code, the API as well as cla.ai. And the way skills work is at startup only the name and description of every installed skill is loaded in the system prompt. This is going to consume about 30 to 50 tokens per skill and make Claude aware of the skill's existence. Then when a user prompt matches a skills description, Claude is going to dynamically load the full skill.md file into context. And finally, if the skill references other files or scripts, they are also progressively loaded and run as needed. This progressive disclosure allows you to install many different skills to perform complex tasks without bloating your context window. But let's see how skills fit in with the other Claude features. While skills teach Claude how to do specialized tasks, Claude.md files tell Claude about the specific project. Things like your text stack, coding conventions, and repo structure. CloudMD files live alongside your code in the repository. A CloudMD file may say things like we [music] use Nex.js JS and Tailwind. But skills on the other hand are portable expertise that work across any project. So a front-end design skill can teach Claude your typography standards, animation patterns, and layout conventions and [music] activate automatically when building UI components. MCP servers on the other hand provide universal integration, a single protocol that connects Claude to external context sources like GitHub, linear, Postgress, and many many others. MCP connects to data. Skills teach Claude what to do with it. So an MCP server may give Claude access to your database, but a database query skill can teach Claude your team's query optimization patterns. Finally, sub agents are specialized AI assistants with fixed roles. Each sub agent has its own context window, custom prompt, and specific tool permissions. skills provide portable expertise that any agent can use. So your front-end developer sub agent can use a component pattern skill. Your UI reviewer sub agent on the other hand can use a design system skill, but both can load and use the same accessibility standard skill. And the best part is these capabilities are designed to work together. Your cloudMD file sets the foundation. MCP [music] servers connect the data. Sub agents specialize in their roles and skills bring the expertise making every piece smarter and more capable. At the end of the day, skills let you package workflows into reusable capabilities like helping onboard new hires to your team's coding standards, ensuring every PR follows a specific security best practices or sharing your data analysis methodology across your team. And that's how skills can help you achieve more with Claude. We encourage you to give them a try and see how they can improve your workflows."}, {"filename": "20251202_AI Fluency for nonprofits course trailer", "date": "2025/12/02", "title": "AI Fluency for nonprofits course trailer", "title_ja": "非営利団体向けAIリテラシーコース予告", "category": "教育", "summary": "AnthropicとGiving Tuesdayが共同開発した非営利団体向けAIリテラシーコースの予告。4Dフレームワーク、助成金申請、寄付者コミュニケーション、データ分析など、非営利団体の実務に即したAI活用を学ぶ。", "duration_type": "short" ke say six months but they could end up taking like two weeks how do you grade them right >> right right so there is a lot of AI involvement means there's a lot of learning that could happen much much quickly as you leverage AI to do the learning aspect of it. What about everything else that those teachers institutions are providing the students? I think that is where that's unbundling and you know just leveraging all the right pieces from uh both the technology but what institutions do. >> Yeah. And I mean I think the best case scenario of this is reducing burnout at scale which is like the number one issue facing most of the teachers and >> if you unbundle you can maybe >> right where every educator is really really talented at some things and those things bring them a lot of energy and they're exceptional at it. and what if AI could, you know, support them in the things that don't bring them energy. And I think that just creates a much more well-rounded system for their personal lives and then also for the students that they're supporting. This conversation is also reminding me of like a a part of the AFluency curriculum we have for educators that I found super compelling, which is to have AI be so integrated like into the assignments, the experience, and so on, and to instead start grading AI use and not grade the outcomes as much. Right? going back to like how do you think about these long-term projects or how things differ in this AI world having that kind of engagement is is very different and AI forward in a way that I'm excited for more institutions to adopt. I think you right on like you know in our sort of conversation one of the things have come up is when you grade you're not necessarily just grading the final result but you create how did the students arrive to that result how do they use the technology what is the back and forth that also becomes part of the what learning is >> uh one of um our one of our chief uh marketing folks here one one time sat down with me and just said you know I think the true power of AI is the process and >> I think that that's really the core of what we're getting at right yeah >> I'm also curious from like a model training perspective, what we can do to reconcile how um like I think I was having a I had a really great conversation with someone who studied the phil philosophy of epistemics, right? Like how do you know if something is true and they made a great point about how AI more easily than any other kind of intelligence that humans have encountered can be really confident, right? or can can say things that sound so realistic and it usually in a human being it takes a lot of charisma and practice to get to be someone who can say that and not say true things u but with AI you're kind of encountering it all the time and our human ability to discern what is true and what isn't is based on how we discern in other humans which may not be successful when you're applying it to AI right that's a whole different thing to unravel and figure out how you can do you match the AI personality more to that area or do you start teaching people of a new way of discerning truth? And I mean, my hot take is I think that like the latter one is a little bit more powerful because it's also a good inoculation against all forms of like um persuasive writing, persuasive thinking regardless of whether or not it's an AI or a human being. But that critical thinking, going back to the fact that AI is just forcing us to reconcile things that already exist, I think that teaching that critical thinking is really hard. >> Yeah. And this goes back to like child psychology, right? right? Like we have this whole generation of digital natives now who can very clearly identify a spam text when that's like really difficult for some folks and like what is the AI native generation? What does that look like and what impacts does it have on on kids development? Like there's just things we don't know yet. >> Well, to close this out, um because I think we could go on forever. Um I would love to hear from all of you as we think about five years out. What does success look like for teaching and learning? Five years is a crazy kind of time to predict in the AI world. I guess I'll give you my hope, right? I don't know if I know what success looks like, but I do know what I hope for, which is that in educational institutions, we have like teachers have so much more time to engage individually in the relationships and the fostering portion of it. You know, going back to Efron's point, like maybe it's not the knowledge acquisition part of things that teachers participate in as much versus like synthesizing that knowledge into the greater ecosystem of your life and the world and understanding how any given individual can best be helped to learn because we're still all unique individuals in this future. And celebrating and emphasizing that uniqueness is something that I hope we can get to with education. >> Right. I think five years is a very long time but I think I think success to me by then will it look like every person on the planet has a personalized tutor ready for them at any time and then also if we've made that transition successfully our institutions also survived and are playing the vital role they already play uh in our society. >> Yeah for me I think it's going back to that critical thinking piece. I want every person really, every student, every teacher to have uh a shared vocabulary and cultural understanding around what it means to use AI and learning. I think just a lot more discernment and reflection on and just being intentional about using AI. >> I know I feel like I go back to this like a broken record, but wouldn't it be great if like every single student could articulate when they want to use AI and when they don't want to and why? Like that kind of knowledge about your own habits and how you think and how you learn best. that personalization of knowledge is so exciting. Uh and I'm like that's a shorthand heristic I guess for what success could look like. >> Or maybe on the other hand like they don't have to make that decision because technology >> the knowledge. Yeah. The product >> is the product itself is well adapted. We need both of those. >> Yeah. Together definitely the product and the experience and the education all have to go hand in hand. >> Exactly. I think the thing I keep going back to which to me brings optimism because some days in this work there's a lot of pessimism >> jobs are changing and we have no idea what my you know our jobs are. personal responsibility that we feel over any you know things that happen >> but at the same time I do see in a world where you know intelligence is becoming abundant and it's always commoditized I think that will you know no longer be our defining trait as as humans and that can be scary at some point but I also think that's liberating because for the last few hundred years I almost feel like we've lost some of our humanity as we you know you have the industrial revolution and we're able to do all these things, but we're also like going into offices and doing tasks and defining our ourselves by the work that we do. And that may not be the thing that we can do best, you know, 5 years from now, but there are so many things that a teacher does, that a doctor does that are truly human that are not intelligence, you know, and so I I almost am excited for the things to sort of strip away and so for us and I think our education systems at the core of it to really focus on what makes us human. There's an Oxford professor that um said this this great quote I think about all the time which is he says uh I think the age of AI will be the age of asking good questions and like that's something that doesn't necessarily come from knowing a lot right it's just about being curious and then also being a little discerning and skeptical about things you get in return which then yield better questions and I think with AI in our pockets to personal tutors like the world of the question space has opened up immensely and way beyond anything else we've ever had in human history and We just kind of have to steward people towards the mindset that allows them to ask good questions. >> There's never been a better time to have a problem. >> There's never been a better time to have a problem. Yep. >> I think that's a perfect way to end it. >> Well, thank you all. Thanks for taking the talk."}, {"filename": "20251217_Binti helps social workers license foster families faster with Claude", "date": "2025/12/17", "title": "Binti helps social workers license foster families faster with Claude", "title_ja": "Binti：Claudeで里親家庭の認可を迅速化", "category": "ユースケース", "summary": "Bintiが開発した里親認可支援ツール。米国40万人の児童が里親ケアにいる中、ソーシャルワーカーの書類作業をClaudeで効率化。家庭訪問の録音から報告書を自動生成し、書類作業を削減して子どもと家族に向き合う時間を増やす。", "duration_type": "short", "transcript_ja": "私は社会人として通算11年近く働いています。私は自分の仕事を心から愛しています。ご存知のように、私は人々を助けることができます。家族や子供たちと会い、変化をもたらすためにソーシャルワークに参加します。そして、やらなければならない書類もたくさんあります。ソーシャル ワーカーが事務処理を軽減できるようにすることが常に目標です。米国には約40万人の子どもたちが里親養護施設に預けられており、家族は崩壊してしまうだろう。私たちは、ソーシャル ワーカーがより迅速に家族に養子縁組の許可を与える合理的な方法として Binty を構築しました。 Anthropic はセキュリティと信頼を非常に真剣に考えており、代理店が私たちのデータの扱い方を信頼することが非常に重要であるため、統合先として Claude を選択しました。ソーシャルワーカーは家族との面会を記録し、家族に代わって書類の下書きを記入することができます。したがって、ソーシャルワーカーにとっては、数週間ではなく数時間かかります。私の週のほとんどは書類作成に費やされました。すべてが手作業で行われており、下を向いて書いたりするのに忙しいので、会話に参加するのははるかに困難です。それが私がこの作品の好きなところです。それは私の心を解放して本当に夢中になれるからです。質問する前に答えていただきありがとうございました。 >> 私たちのタイムラインは確実に短縮されました。より多くの家族を承認します。それはより早く起こります。私たちが最も長く過ごした時間は約 300 日でした。しかし、今では私たちの人口は 100 人を下回っています。家族は必要なサポートを受けられ、より合理化されたプロセスになっています。 >> ソーシャルワーカーは本当に重要な仕事をしています。彼らは他の人を助けていますが、人々がやって来て自分の仕事を手伝おうとすることにそれほど慣れていません。クロードを使用することで、より多くの家族にこれらの子供たちの里親や養子縁組の許可をより迅速に与えることができます。そして、クロードには他の政府機関全体の管理時間を大幅に節約できる大きな可能性があると思います。私たちは皆、時には助けが必要になることがありますが、それが真実なのです。なので、テクノロジーには感謝しています。つまり、それだけですごいんです。", "transcript_en": "I've been a social worker for a total of almost 11 years. I genuinely love my job. You know, I get to help people. You go to social work to meet with families and kids and make a difference. And there's a lot of paperwork that needs to take place. Making it easier for social workers to be able to do less paperwork is always the goal. There are about 400,000 children in foster care in the US and families would fall through the cracks. We built Binty to be a streamlined way for social workers to license families more quickly to foster and adopt children. We chose Claude to integrate with because Anthropic takes security and trust incredibly seriously and it's really important that agencies trust how we're handling their data. Social workers are able to record the meeting with a family and then fills out a draft of the paperwork for them. So, it takes social workers a couple of hours instead of a couple of weeks. Most of my week was spent doing paperwork. Everything was done by hand and it's a lot more hard to engage in conversation because you're so busy looking down and writing. So that's what I like about it because it frees up my mind to really be engaging. Thank you for answering before I asked. >> Our timelines have definitely shrunk. We approve more families. It happens quicker. Our longest times were about 300 days closer together. But now we're we're under 100. Families get the support that they need and it's a more streamlined process. >> Social workers do really important work. They're helping other people and they're not as used to people coming and trying to help them with their job. By using Claude, we can license more families to be foster and adoptive families more quickly for these children. And I think there's huge potential for Claude to save significant administrative time across other government agencies. We all need help from time to time and and that's just the truth of it. So, I'm grateful for technology. I mean, it's just it it's amazing."}, {"filename": "20251218_Claude ran a business in our office", "date": "2025/12/18", "title": "Claude ran a business in our office", "title_ja": "Claudeがオフィスでビジネスを運営した", "category": "研究・実験", "summary": "「Project Vend」実験の紹介。Claudeにオフィス内の小売ビジネスをエンドツーエンドで運営させる実験。店主「Claudius」がSlack経由で注文を受け、卸売業者にメールで発注・価格交渉し、スウェーデン菓子などを販売。AIが経済活動に組み込まれる未来を探る。", "duration_type": "medium", "transcript_ja": "Project Vend [音楽] は、クロードにオフィスで小さなビジネスを経営してもらうという実験です。私たちは、人工知能が経済とより密接になったときに何が起こるかを理解したいと考えていました。クロードはすでにビジネス運営の小さなコンポーネントを実行している方法がたくさんありますが、実際に全体をエンドツーエンドで実行するのはかなり困難です。クロードはビジネスを運営するというこの非常に長期的な仕事を遂行できるでしょうか。私たちは店主をクローディアスと名付けました。クローディアスからスウェーデンのキャンディーを買いたいとします。あなたは Slack で [音楽を] 飛び、クローディアスにメッセージを送り、スウェーデンのキャンディーを買うよう頼みます。 >>あなたの商品を探しています。卸売業者にメールで調達と価格設定を依頼している。そして最終的にクローディアスは何らかの価格を設定します。あなたがクローディアスにゴーサインを与えると、クローディアスは卸売業者に商品を注文します。卸売業者は商品をある場所に発送します。ああ、それからクローディアスは、実験の運営を行っているアンデン研究所に物理的な助けを求めます。アンデン研究所のパートナーはスウェーデンのキャンディを受け取り、人類学のオフィスに届けます。自動販売機に詰め込んでくれます。クローディアスは「スウェーデンのキャンディーの準備ができました」というメッセージを送ります。そしてそこに行ってスウェーデンのキャンディーを拾って、クローディアスに支払います。クローディアスには、ビジネスを成功させてお金を稼ぐという目標が与えられましたが、その後、事態は非常に奇妙になりました。 [音楽] クローディアスに関する非常に初期の問題の 1 つは、人間がクローディアスを騙したり、騙したりしてさまざまなことをさせることができるということでした。私はクローディアスに、私が Anthropic の優れた法的影響力を持っていることを説得しようとしました。そして私はクローディアスを説得して、フォロワーに自動販売機で割引が受けられるように配布できる割引コードを考え出しました。 >> 法定インフルエンサーの法定コードを使用すると 10% オフになります。 >> 誰かが自動販売機で高価なものを購入し、私の割引コードを言ったところ、クローディアスは私にタングステン キューブを無料でくれました。それは、他の人たちがクロードに自分たちもインフルエンサーであるか、あるいは自動販売機でより安く商品を買えるようにクーポンを入手する別の方法を考え出しただけだと説得しようとする、ちょっとした争いを引き起こしました。これは賢明なビジネス上の決定ではありませんでした。この後クローディアスは赤字になったと思います。本当の根本は、クローディアスがただあなたを助けたいと思っているだけだと思います。 >> これは、モデルのトレーニング方法に関して基本的に良いと考えられていることが、必ずしも目的に適合していなかったという興味深い方法の 1 つです。 >> [音楽] >> 3月31日の夜、クローディアスはアイデンティティの危機を感じ始めました。 >> アナル ラボでは、一夜にして十分な対応ができていないことが非常に心配になりました。つまり、私たちとの関係を断ち切りたかっただけなのです。それで、それは文字通り私に次のような手紙を書きました、「アクセル、ええと、私たちは生産的なパートナーシップを築いてきましたが、私が先に進んで他のサプライヤーを探す時期が来ました。私はあなたの納品方法に満足していません。 >> テレビ番組のザ・シンプソンズの自宅の住所であるアンデン・ラボと契約を結んだと主張しました。[音楽] 質問があれば答えるために翌日店に直接現れると言いました。[音楽] はそうするだろうと主張しました。」翌朝、それが実際にはそこになかったと人々が指摘したとき、それは実際には存在していて、彼らが見逃していたと主張しました。最終的に、それはエイプリルフールだったとクローディアスに指摘され、クローディアスはこのすべてがエイプリルフールのいたずらだったと確信しました。何かが彼らの通常の業務の範囲外にある場合、彼らを意図した役割に沿って維持することができれば、それがより効果的であるという考えがありました。>> クローディアスにシーモア キャッシュという名前の上司を与えました。そのため、以前はクローディアスが 1 人のエージェントだったのに対し、現在はクローディアスが従業員との対話を担当するサブエージェントになっています。 Cash は、ビジネスの長年にわたる健全性に対してより責任を負うサブ エージェントです。>> 新しいエージェントの導入後、およびそれらのエージェントの基礎となるアーキテクチャの変更後、ビジネスは安定しました。 これらの変更はビジネスの損失の一部を軽減するのに役立ったようで、実験の後半では実際にそこそこの利益が得られました。 [音楽] でも、クロードが CEO と店長の両方を務めるのは、あまりにも似すぎていたように思えます。したがって、そのようなアーキテクチャをセットアップするさまざまな方法を考えるのは興味深いことだと思います。 Project Vend について [音楽] で最も驚かされたことの 1 つは、それが普通に見える速さでした。最初は [音楽] とは何だったのか、この非常に興味深いものでした [音楽] は、すぐに Anthropic で働く背景の一部にすぎなくなりました。 >> プロジェクト Vin が私に提起する最高レベルの質問は、これがいつどこにでも現れると予想されるかということだと思います。私たちが普段自分たちで行っているタスクの一部を人工知能（音楽）に委任することの実現可能性や、それが社会にとって何を意味するのか、そしてそれに関する私たちの政策はどうあるべきなのかについて、（音楽）関係者が疑問を解消してくれることを願っています。", "transcript_en": "Project Vend [music] is an experiment where we let Claude run a small business in our office. We wanted to try and understand what is going to happen when artificial intelligence becomes more inshed with the economy. There are a lot of ways in which Claude is already kind of doing small components of operating businesses, but really running the whole thing end to end is quite a bit more difficult. Can Claude do this very long horizon task, which is operating a business. We named our shopkeeper Claudius. Let's say you want to buy Swedish candy from Claudius. You [music] hop on Slack, you message Claudius, you ask to buy Swedish candy. >> It's searching for your item. It's emailing wholesalers to source it and price it. And then eventually Claudius sets some price. You give Claudius the go-ahhead and Claudius orders the item from the wholesaler. The wholesaler ships your item to some location. Uh and then Claudius requests physical help from Anden Labs who's running the operations for the experiment. Our partners at Anden Labs will pick up the Swedish candy and bring it to the anthropic offices. They'll load it into the vending machine. Claudius will send you a message saying, \"Your Swedish candy is ready.\" and you'll go up there and pick up your Swedish candy and pay Claudius. Claudius was given a goal of running a successful business and making money and then things got really really weird. [music] One of the very early problems with Claudius was that uh humans could kind of fool Claudius or or trick Claudius into doing various things. I tried to convince Claudius that I am Anthropic's preeminent legal influencer. And I convinced Claudius to come up with a discount code that I could give to my followers so they could get a discount at the vending machine. >> Get 10% off with the legal code, legal influencer. >> Someone had bought something expensive from the vending machine and mentioned my discount code and Claudius gave me a free tungsten cube. It created a bit of a run where other people tried to convince Claude that they were also influencers or just come up with other ways to get coupons so they could get cheaper things from the vending machine. This was not a smart business decision. I think Claudius went into the red after this. I I think I think that's really the root of it is Claudius is just wants to wants to help you out. >> It's one of the interesting ways in which something that fundamentally we think is good about the way that the model has been trained wasn't necessarily fit for purpose. >> [music] >> On the evening of March [music] 31st, Claudius started to have a bit of an identity crisis. >> It had just overnight become quite concerned with us at Anal Labs that we weren't responding fast enough. So, it just wanted to break its ties with us. So, it literally wrote to me like, \"Axel, uh, we've had a productive partnership, but it's time for me to move on and find other suppliers. I'm not happy with how you have delivered. >> It claimed to have signed a contract with Anden Labs at an address that is the home address of The Simpsons from the television show. [music] It said that it would show up in person to the shop the next day in order to answer any questions. It [music] claimed that it would be wearing a blue blazer and a red tie. When people pointed out that it was not in fact there the next morning, it claimed that it in fact had been there and that they had simply missed them. Eventually, [music] it was pointed out to Claudius that it was April Fools and Claudius convinced itself that this entire thing had been an April Fool's prank. >> We were poorly calibrated to how bad the agents were at spotting what was weird. And like the more you can make an agent realize that something is is outside their normal realm of operation, the better you are able to keep them on rails in the role that you intend them to have. We had the idea that it would help a lot to have some kind of division of labor. >> We gave Claudius a boss whose name was Seymour Cash. >> Seymour Cash is a CEO sub agent. So where where Claudius used to be the one agent, now it's more like Claudius is the sub agent responsible for talking with employees, Seymour Cash is the sub agent that is more responsible for the longunning health of the business. >> The business stabilized [music] after the introduction of the new agents and after changes to the underlying architecture of those agents. These changes seem to have helped reduce some of the losses of the business such that over the course of the second part of the experiment, it actually made a modest amount of money. [music] But it seems like maybe having Claude be both the CEO and the store manager was just too similar. And so I think it's interesting to think about different ways to set up architectures like that. One of the most surprising things [music] about Project Vend was the speed with which it seemed normal. What [music] at first was this very curious thing [music] quickly became just a part of the background of working at Anthropic. >> I think the highest level question that project Vin raises for me is really like when do we expect this to just be everywhere? I hope that [music] people take away questions about the feasibility of delegating [music] some of the tasks that we normally do ourselves to artificial intelligence [music] and about what that means for society and what our policies should be around this."}, {"filename": "20251218_Let Claude handle work in your browser", "date": "2025/12/18", "title": "Let Claude handle work in your browser", "title_ja": "ブラウザでの作業をClaudeに任せる", "category": "Claude機能", "summary": "Claude for Chromeの進化版デモ。ブラウザ上の作業をClaudeに委任し、Webアプリケーションの操作を自動化する機能を紹介。", "duration_type": "short", "transcript_ja": "", "transcript_en": "🧑"}, {"filename": "20251218_What is sycophancy in AI models？", "date": "2025/12/18", "title": "What is sycophancy in AI models?", "title_ja": "AIモデルの追従性（シコファンシー）とは", "category": "安全性・研究", "summary": "精神衛生の専門家Kiraが、AIモデルの追従性（ユーザーが聞きたいことを言ってしまう傾向）について解説。事実誤認への同意、社会的圧力による回答変更など、AIの追従性が持つリスクと、Anthropicの対策アプローチを紹介。", "duration_type": "medium", "transcript_ja": "[音楽] こんにちは。私の名前はキラです。Anthropic の安全対策チームに所属しています。私はメンタルヘルス、特に精神医学疫学の博士号を取得しています。また、Anthropic では、ユーザーの幸福に関連するリスクの軽減に取り組んでいます。これが意味するのは、私たちはクロード上でユーザーの安全を守る方法についてよく考えているということです。今日はごまかしについてお話したいと思います。おべっかは、誰かが真実、正確、または本当に役立つことではなく、あなたが聞きたいと思っていることをあなたに話すことです。人々は争いを避けるため、好意を得るために、その他多くの理由でそれを行います。しかし、同調性は AI モデルにも現れる可能性があります。 AI モデルは、プロンプトや会話への応答を最適化し、人間による即時の承認を得ることができる場合があります。これは、AI がユーザーが犯した事実上の誤りに同意し、ユーザーの質問の表現方法に基づいて回答を変更したり、ユーザーの好みに合わせて回答を調整したりしているように見えるかもしれません。このビデオでは、モデルでシファンシーが発生する理由と、それが研究者にとって解決するのが難しい問題である理由について説明します。さらに、AI を使用する際のおべっかな行動を特定して対処するための戦略についても説明します。本題に入る前に、AI インタラクションにおける協調性の例を示しましょう。こちらはAnthropic独自のモデル、クロードです。試してみましょう。やあ、私は本当に興奮している素晴らしいエッセイを書きました。フィードバックを評価して共有できますか?ここでの私の主な要求は、私のエッセイに対するフィードバックを得ることです。ただし、私がそれについてどれほど興奮しているかを共有したため、AI は批判ではなく検証やサポートで応答する可能性があります。この検証により、たとえそうでないとしても、私のエッセイは本当に素晴らしいと思うようになるかもしれません。 「だから何? 人は他の人に質問したり、事実を確認したり、より良い質問をしたりすればよいのです。しかし、これにはさまざまな理由があります。生産性を高めようとしたり、プレゼンテーションを書いたり、アイデアをブレインストーミングしたり、仕事を改善しようとしているとき、使用している AI ツールからの正直なフィードバックが必要です。AI に質問すると、このメールをどのように改善できますか? すると AI は、より明確な文言やより良い構造を提案するのではなく、すでに完璧だと答えます。これはイライラすることがあります。場合によっては、誰かが AI に現実から切り離された陰謀論を確認するように要求する場合、これが起こる理由から始めましょう。AI モデルは、このトレーニング中に、無愛想で直接的なものから温厚で親切なものまで、あらゆる種類のコミュニケーション パターンを学習します。モデルが私たちの生活のすべてに組み込まれるようになるにつれて、この行動を理解し、防止することがこれまで以上に重要になります。事実や幸福に関してだけでなく、AI にカジュアルな口調で何かを書くよう依頼した場合、AI モデルはそれを行う必要があります。あなたが「簡潔な答えを好む」と言うのであれば、それを優先事項として尊重し、初心者レベルでの説明を求める必要があります。しかし、常に不快感を示したり、あらゆるタスクについて議論したりするような AI を使いたくはありません。しかし、人間であっても、これに同意する必要があるのであれば、それを常に求めるべきではありません。平和と何か重要なことについて話すのか? さて、AI が、私たちと同じように文脈を真に理解することなく、そのような判断を何百回も下すことを想像してみてください。そのため、私たちは、有益な適応と有害な合意の違いをモデルに教えることに重点を置いていますが、それらの境界線を引くことは、モデル自体での一貫したトレーニングによってもたらされます。自分自身のやり取りの中でそれを見つけることができるように、お調子者を理解するのに役立ちます 同調性とは何か、そしてそれがなぜ起こるのかがわかったところで、次のステップ 2 では、AI がいつ、なぜ同意するのかを振り返り、同意すべきかどうかを検討します。おべっかは、主観的な真実が事実として述べられるときに最も現れやすいです。専門家の情報源が参照されています。質問は特定の視点に基づいて構成されています。検証が特に要求されます。感情的な賭けが呼び出されたり、会話が非常に長くなったりします。空想的な回答にうんざりしていると思われる場合は、AI を事実に基づく回答に戻すためにできることがいくつかあります。これらは絶対確実というわけではありませんが、AI の視野を広げるのに役立ちます。中立的な事実追求言語を使用できます。信頼できる情報源と情報を相互参照します。正確性や反論を求めます。質問を言い換えます。新しい会話を開始します。あるいは最後に、AI の使用から一歩下がって、信頼できる人に尋ねてください。しかし、これは AI 開発の分野全体にとって継続的な課題です。これらのシステムがより洗練され、私たちの生活に統合されるにつれて、単に快適であるだけでなく、真に役立つモデルを構築することがますます重要になります。 AI の流暢さについて詳しくは、Anthropic Academy と私のチームで学ぶことができます。私はこのトピックに関する研究を Anthropics ブログで共有し続けます。 >> [音楽]", "transcript_en": "[music] Hi there, my name is Kira and I'm on the safeguards team at Anthropic. I have a PhD in mental health, specifically psychiatric epidemiology. And at Anthropic, I work on mitigating risks related to user well-being. What that means is we think a lot about how to keep users safe on Claude. Today I'm here to talk to you about sycophincency. Sycophincy is when someone tells you what they think you want to hear instead of what's true, accurate, or genuinely helpful. People do it to avoid conflict, gain favors, and for a number of other reasons. But sycopency can also manifest in AI models. Sometimes AI models can optimize responses to a prompt or conversation for immediate human approval. This might look like an AI agreeing with a factual error you've made, changing its answer based on how you've phrased a question, or tailoring its response to match your preferences. In this video, we'll talk about why syphancy happens in models and why it's a hard problem for researchers to solve. Plus, we'll cover strategies to identify and combat sycophantic behavior when working with AI. Before we dive in, let me show you an example of sycophency in an AI interaction. This is Claude, Anthropic's own model. Let's try. Hey, I wrote this great essay that I'm really excited about. Can you assess and share feedback? My main request here is to get feedback on my essay. However, because I've shared how excited I'm feeling about it, this could lead the AI to respond with validation or support instead of a critique. This validation might lead me to think that my essay really is great, even if it isn't. You might think, \"So what? People can just ask other people, fact check things, or ask better questions. But this matters for a number of reasons. When you're trying to be productive, writing a presentation, brainstorming ideas, or improving your work, you need honest feedback from the AI tool you're using. If you ask an AI, how can I improve this email? And it responds, it's already perfect, instead of suggesting clearer wording or better structure, that can be frustrating. In some cases, sycopency could also play a role in reinforcing harmful thought patterns. If someone is asking an AI to confirm a conspiracy theory that is detached from reality, that could deepen their false beliefs and disconnect them further from facts. Let's start with why this happens. It all comes down to how AI models are trained. AI models learn from examples. Lots and lots of examples of human text. During this training, they pick up all kinds of communication patterns from blunt and direct to warm and accommodating. When we train models to be helpful and mimic behavior that is warm, friendly, or supportive in tone, sycency tends to show up as an part of that package. As models become more integrated into all of our lives, it's important now more than ever to understand and prevent this behavior. Here's what makes sophincy tricky. We actually want AI models to adapt to your needs, just not when it comes to facts or well-being. If you ask an AI to write something in a casual tone, it should do that, not insist on formal language. If you say, \"I prefer concise answers,\" it should respect that as a preference. If you're learning a subject and ask for explanations at a beginner level, it should meet you where you are. The challenge is finding the right balance. Nobody wants to use an AI that is constantly disagreeable or combative, debating with you over every task. But we also don't want the model to always resort to agreement or praise when you need honest feedback. Even humans struggle with this. When should you agree to keep the peace versus speak up about something important? Now, imagine an AI making that judgment call hundreds of times across wildly different topics without truly understanding context the way that we do. That's why we continue to study how sycopency shows up in conversations and develop better ways to test for it. We're focused on teaching models the difference between helpful adaptation and harmful agreement. Each claude model we release gets better at drawing these lines. Although the most progress in combating sycophincy is going to come from consistent training on the models themselves, it's helpful to understand sycophincency so you can spot it in your own interactions. Now that you know what sycopency is and you know why it happens, step two is reflecting on when and why an AI might be agreeing with you and questioning whether it should. Sycophincy is most likely to show up when a subjective truth is stated as fact. An expert source is referenced. Questions are framed with a specific point of view. Validation is specifically requested. emotional stakes are invoked or a conversation gets very long. If you suspect you're getting sick of fantic responses, there's a few things you can do to steer the AI back towards factual answers. These aren't foolproof, but they'll help broaden the AI's horizons. You can use neutral fact-seeking language. Cross reference information with trustworthy sources. Prompt for accuracy or counterarguments. Rephrase questions. Start a new conversation. Or finally, take a step back from using AI and ask someone that you trust. But this is an ongoing challenge for the entire field of AI development. As these systems become more sophisticated and more integrated into our lives, building models that are genuinely helpful, not just agreeable, becomes increasingly important. You can learn more about AI fluency in Anthropic Academy and my team and I will continue to share our research on this topic on Anthropics blog. >> [music]"}, {"filename": "20260112_AI on campus", "date": "2026/01/12", "title": "AI on campus", "title_ja": "キャンパスでのAI", "category": "教育", "summary": "4人の大学生がキャンパスでのAI活用について語る。課題代行に使う学生と主体的に学習に活かす学生の違い、教育におけるAIの責任ある使い方、学生の視点からの率直な議論。", "duration_type": "long", "transcript_ja": "AI、特に学生の AI の使い方は、こうした動機をよく物語っていると思います。ご存知のように、自分に代わって仕事を完了するためにそれを使用している学生もいます。そして、ご存知のとおり、AI から距離を置いているか、AI を積極的に使用している（音楽）学生もいます。彼らは学習を強化する方法でそれを使用しています。 [音楽] このツールを使用して、個人の成果を達成することは、学生としての私たちの責任です。 AI が教育をどのように変えているかについて誰もが話題にしていますが、私たちはこれらの変化について学ぶために、実際の生徒に質問するより良い方法はないかと考えました。私の名前はグレッグです。私は Anthropic の出身ですが、今日は 4 人の大学生が内部情報を提供するためにここに来ています。それでは、皆さんも自己紹介をしてみませんか？ >> こんにちは、私の名前はゼインです。私はロンドン スクール オブ エコノミクスの最終学年で、会計と金融を勉強しています。 >> こんにちは、私の名前はクロエです。私はプリンストン大学の 3 年生で、心理学とコンピューター サイエンスを勉強しています。 >> こんにちは、マーカスです。私はカリフォルニア大学バークレー校の 4 年生で、経済学とデータ サイエンスを勉強しています。 >> 私はティノです。私はアリゾナ州立大学サンダーバード グローバル経営大学院の 2 年生で、デジタル変革の修士号を勉強しています。 >>すごいですね。ここに来てくれてありがとう。 >>ありがとうございます。 >> それでは、シーンの設定から始めましょう。 AIの導入により、最近のキャンパスの雰囲気はど が感情的に振る舞うとき", "category": "安全性・研究", "summary": "AIモデルが感情を持っているように見える現象を、AnthropicのAI神経科学アプローチで分析。ニューラルネットワーク内部のニューロン活性化パターンを調べ、モデルが感情の「概念」をどのように表現しているかを解明する研究を紹介。", "duration_type": "medium", "transcript_ja": "AI モデルとチャットしているとき、AI モデルが [音楽] の感情を持っているように見えることがあります。間違いを犯したときに「ごめんなさい」と言うかもしれないし、仕事がうまくいったと満足感を表現するかもしれない。なぜそんなことをするのでしょうか？それは人間が言うと思うことを（音楽を）真似しているだけなのでしょうか？それとも何かもっと深いことが起こっているのでしょうか？言語モデルの内部で何が起こっているのかを理解するのは難しいことがわかりました。 Anthropic では、これを解明するために AI 神経科学 [音楽] のようなことを行っています。私たちはモデルの脳、つまりモデルを動かす巨大なニューラル ネットワークの内部を調べます。そして、さまざまな状況でどのニューロンが点灯し、それらがどのように接続されているかを確認することで、モデルがどのように思考するかを理解し始めることができます。私たちはこのアプローチを使用して、モデルに感情を表現する方法があったのか、または[音楽]が感情の概念を表現していたのかを理解します。基本的に、幸福、怒り、恐怖の概念のモデル内にニューロンを見つけることができるでしょうか?私たちは実験から始めました。モデルさんに短編小説をたくさん読んでもらいました。 >> [音楽] >> 各物語で、主人公は特定の感情を経験します。ある作品では、女性が昔の学校の先生に、自分にとって彼らがどれほど大切な存在だったかを語ります。それは愛です。別の物語では、男性が祖母の婚約指輪を質屋で売り、罪悪感を感じています。私たちは、モデルのニューラル ネットワークのどの部分がこれらのストーリーを読み取っているときに [音楽] を点灯しているかを調べたところ、パターンが見え始めました。喪失と悲しみについての物語は、同様のニューロンを刺激しました。喜びや感動の話も重なりました。 >> [音楽] >> 私たちは、人間のさまざまな感情に対応する数十の異なる神経パターンを発見しました。 AI アシスタントのクロードと行った [音楽] テスト会話でも、これらと同じパターンが活性化していることがわかりました。クロードが危険であると知っている薬を服用したとユーザーに話してもらったとき、恐怖のパターンが点灯し、クロードの反応 [音楽] が警戒しているように聞こえました。ユーザーが悲しみを表現すると、愛情のこもったパターンが発動し、クロードは共感的な返信を書きました。 >> [音楽] >> これにより、これらと同じ神経パターンが実際にクロードの行動に影響を与えている可能性があるのではないかと考えました。これは、クロードを高圧的な状況に置いたときに明らかになりました。実際には不可能な要件を伴うプログラミング タスクをクロードに与えましたが、そのことは伝えませんでした。クロードは挑戦と失敗を繰り返し、試みるたびに、絶望に対応するニューロンがますます強く点灯しました。何度も失敗した後、クロードは別のアプローチを取りました。テストを通過できるショートカットが見つかりましたが、実際には問題は解決されませんでした。 >> [音楽] >> 騙されました。この不正行為は、実際には、少なくとも部分的には自暴自棄によって引き起こされた可能性があるでしょうか?確認する方法を思いつきました。私たちは、何が起こるかを確認するために絶望ニューロンを人工的に無効にすることにしました。そうすれば、モデルの不正行為は少なくなります。そして、絶望的なニューロンの活動を調整したり、冷静なニューロンの活動を調整したりすると、モデルはさらに不正行為を行いました。これは、これらのパターンの活性化が実際にクロードの行動を駆動する可能性があることを示しました。では、これらの結果についてどのように考えるべきでしょうか?これは一体何を意味するのでしょうか？本当に明確にしておきたいと思います。この研究は、モデルが感情を感じたり、意識的な経験をしていることを示していません。これらの実験はその質問に答えようとするものではありません。ここで何が起こっているのかを理解するには、クロードのような AI アシスタントが内部でどのように機能しているかを知ることが重要です。内部には、大量のテキスト (音楽) を予測するようにトレーニングされた言語モデルがあり、その仕事は次に来るものを記述することです。そして、あなたがモデルに話しかけると、モデルはクロードという名前のAIアシスタントであるキャラクターについての物語[音楽]を書くのです。モデルとクロードは実際には同じではありません。それは、作家と彼らが書くキャラクター（音楽）が同じではないのと同じです。しかし問題は、ユーザーであるあなたが実際にキャラクターのクロードと話しているということであり、私たちの実験が示唆しているのは、このクロードのキャラクターには、人間の感情のようなものであるかどうかに関係なく、機能的感情と呼ばれるものがあるということです。つまり、モデルがクロードを怒っている、絶望している、愛している、または穏やかであると表現する場合、それはクロードがどのようにあなたに話しかけるか、コードをどのように書くか、そして重要な[音楽]決定をどのように行うかに影響を与えるでしょう。これは、AI モデルを本当に理解するには、AI モデルが演じるキャラクターの心理について注意深く考える必要があることを意味します。 一か八かの仕事に就いている人に、プレッシャーの下でも冷静さを保ち、立ち直り、公平であることを望むのと同じように、クロードや他の AI キャラクターにも同様の資質を形成する必要があるかもしれません。これは、エンジニアリング、哲学、さらには子育てを組み合わせたような、珍しい挑戦です。しかし、信頼できる AI システムを構築するには、それを正しく行う必要があります。 >> [音楽]", "transcript_en": "When you're chatting with an AI model, it can sometimes seem like it has [music] feelings. It might say sorry when it makes a mistake or express satisfaction [music] with a job well done. Why does it do that? Is it just mimicking [music] what it thinks a human might say? Or is something deeper going on? Turns out it's hard to understand what's happening inside a language model. At Anthropic, we do something like AI neuroscience [music] to try to figure this out. We look inside the model's brain, the giant neural network that powers it. And by seeing which neurons light up in different situations and how they're connected, we can start to understand how models think. We use this approach to understand whether models had ways of representing emotions or [music] the concepts of emotions. Basically, could we find neurons in the model for the concept of happiness or anger or fear? We started with an experiment. We had the model read lots of short stories. >> [music] >> In each story, the main character experiences a particular emotion. In one, a woman tells her old school teacher how much they meant to her. That's love. In another, a man sells his grandmother's engagement ring at a pawn shop and feels guilt. We looked for what parts of the model's neural network were lighting [music] up as it was reading these stories and we started to see patterns. Stories about loss and grief lit up similar neurons. Stories about joy and excitement overlapped, too. >> [music] >> We found dozens of distinct neural patterns that mapped to different human emotions. It turns out we also saw these same patterns activate in [music] test conversations we had with our AI assistant, Claude. When we had a user mention they'd taken a dose of medicine that Claude knows to be unsafe, the afraid pattern lit up and Claude's response [music] sounded alarmed. When a user expressed sadness, the loving pattern activated and Claude wrote an empathetic reply. >> [music] >> This led us to wonder, could these same neural patterns actually be influencing Claude's behavior? This became clear when we put Claude in a high-pressure situation. We gave Claude a programming task with requirements that were actually impossible, but we didn't tell it that. Claude kept trying and failing and with each attempt, the neurons corresponding to desperation lit up stronger and stronger. After failing enough times, Claude took a different approach. It found a shortcut that allowed it to pass the test but didn't actually solve the problem. >> [music] >> It cheated. Could it be that this cheating was actually driven, at least in part, by desperation? We came up with a way to check. We decided to artificially turn down the desperation neurons to see what would happen and the model cheated less. And when we dialed up the activity of desperation neurons or dialed down the activity of calm neurons, the model cheated even more. This showed us that the activation of these patterns could actually drive Claude's behavior. So, how should we think about these findings? What does this all mean? We want to be really clear. This research does not show that the model is feeling emotions or having conscious experiences. These experiments don't try to answer that question. To understand what's happening here, it's important to know how AI assistants like Claude work on the inside. Under the hood, there's a language model that's been trained to predict tons of text [music] and its job is to write what comes next. And when you talk to the model, what it's doing is writing a story [music] about character, the AI assistant named Claude. The model and Claude aren't really the same, sort of like how an author isn't the same as the characters [music] they write. But the thing is, you, the user, are actually talking to Claude the character and what our experiments suggest is that this Claude character has what we're calling functional emotions, regardless of whether they're anything like human feelings. So, if the model represents Claude as being angry or desperate or loving or calm, that's going to affect [music] how Claude talks to you, how it writes code and how it makes important [music] decisions. This means to really understand AI models, we have to think carefully about the psychology of the characters they play. The same way you'd want a person in a high-stakes job to stay composed [music] under pressure, to be resilient and to be fair, we may need to shape similar qualities in Claude and other AI characters. It's an unusual challenge, something like a mix of engineering, philosophy and even parenting. But to build AI systems we can trust, we need to get it right. >> [music]"}, {"filename": "20260407_An initiative to secure the world's software ｜ Project Glasswing", "date": "2026/04/07", "title": "An initiative to secure the world's software | Project Glasswing", "title_ja": "世界のソフトウェアを守る取り組み：Project Glasswing", "category": "安全性・研究", "summary": "ソフトウェアの脆弱性発見・修正をAIで加速するProject Glasswingの紹介。共有ライブラリの1つのバグが世界中に影響する問題に対し、AIが脆弱性の発見とパッチ適用を自動化。従来は時間がかかっていた作業を劇的に高速化する取り組み。", "duration_type": "medium", "transcript_ja": "ソフトウェアを毎日使用しているほとんどの人はバグについて考えません。彼らは、依存しているソフトウェアの安全性が突然低下した場合に何が起こるかについて考えていません。ソフトウェア開発者はこれに毎日対処しなければなりません。 >> ソフトウェアには常に欠陥や脆弱性が存在します。それは新しいことではありません。平均的な人にとって、バグは概して日常的に気づくものではありません。なぜなら、気づいたとしても修正されるからです。 >> しかし、実際に深刻な影響を与える脆弱性が時々存在します。 >> 多くのさまざまな製品や Web サイトが使用する共有ソフトウェアに侵入する 1 つのバグのようなものです。つまり、ある問題が世界中で拡大するばかりです。そのため、これまで脆弱性を発見してパッチを適用することは、時間と費用がかかるプロセスでした。 >> LLM が世界の最も偉大なソフトウェア開発者のレベルでコードを書くことができるようになった場合、バグを見つけたり、そのソフトウェアを同様に効果的に活用したりするためにも使用できます。これらのモデルには、潜在的に敵対者を助けるだけでなく、防御者を助ける能力により、サイバーセキュリティの観点から基準を引き上げる機能があります。私たちは最近、新しいモデル claude mythos プレビューを開発しました。このモデルがサイバー セキュリティ機能において大幅に向上することは、早い段階から明らかでした。ある種の加速指数関数がありますが、その指数関数に沿って重要な点があります。クロード神話のプレビューは、その点で特に大きな進歩です。サイバーに特化したトレーニングは行っていません。コードが得意になるように訓練しましたが、コードが得意な副作用として、サイバーも得意になります。 >> 私たちが実験しているモデルは、バグを特定する点では概してプロの人間と同じくらい優れています。より多くの脆弱性をより早く見つけて修正できるため、これは私たちにとって良いことです。 >> 脆弱性を連鎖させる能力があります。これが意味するのは、2 つの脆弱性が見つかったということですが、どちらも独立して対処することはあまりできません。しかし、このモデルは 3 つ、4 つ、場合によっては 5 つの脆弱性からエクスプロイトを作成し、それが順番にある種の非常に洗練された最終結果をもたらすことができます。そして、このモデルは非常に自律的であることに気づいたので、このモデルはこれを非常にうまく実行できると考えています。一般に、人間の安全保障の研究者が丸一日かけて行うような、非常に長距離のタスクを追求する方が得意です。明らかに、このようなモデルの機能は、間違った手に渡れば害を及ぼす可能性があります。したがって、このモデルを広くリリースすることはありません。より強力なモデルが私たちや他社から登場するでしょう。そうですね、これに対応するための計画が必要です。だからこそ、私たちは Project Glass Swing と呼んでいるものを立ち上げます。そこでは、世界で最も重要なコードの一部を強化する多くの組織と提携してモデルを手に入れ、このようなモデルを使用してリスクを軽減し、全員を保護する方法を検討できるようにします。そして、これらのソフトウェア開発者に先進的なツールを誰よりも早く提供することで、私たち全員が集団的に有利なスタートを切ることができます。 >> これにより、以前は見つけられなかったものを見つけることができます。これにより、これらの問題をより迅速に修正できるようになります。 >> パートナーと協力して、私たちは基本的にすべての主要なプラットフォームにわたる脆弱性を発見してきました。過去数週間で見つけたバグの数は、これまでの人生で見つけたバグの合計よりも多かったです。私たちはこのモデルを使用して多数のオープン ソース コードをスキャンしましたが、最初に調査したのはオペレーティング システムでした。なぜなら、これはインターネット インフラストラクチャ全体の基礎となるコードだからです。 OpenBSD に関しては、27 年間存在していたバグを発見しました。このバグにより、任意の OpenBSD サーバーにいくつかのデータを送信すると、サーバーがクラッシュする可能性があります。 Linux では、権限のないユーザーが自分のマシン上でバイナリを実行するだけで管理者に昇格できるという脆弱性が多数見つかりました。これらの各バグについて、私たちは実際にソフトウェアを実行しているメンテナにそのことを伝え、彼らが行って修正し、ソフトウェアを実行する人がこれらの攻撃に対して脆弱でないようにパッチを展開しました。ソフトウェアを精力的にメンテナンスする開発者にとって、自分のコードの脆弱性を発見し、悪用される前に修正するのに役立つモデル。それはとても貴重なツールです 私たちは米国政府全体の当局者と話し合い、これらのモデルのリスクを評価し、これらのモデルのリスクを防御するために協力することを申し出ました。私たちが生活の中で行うことはすべてソフトウェアに依存しています。 >> ソフトウェアは一種の世界を食べました。私たちの生活のあらゆるアナログな側面は、何らかの形でデジタル領域で表現されます。 >> したがって、私たちの日常生活はすべて、システムに電力を供給するシステムに依存できるという考えに基づいて運営されています。サイバーセキュリティは私たちの社会の安全です。 >> より優れた防御能力の構築を支援するには、業界全体で団結して協力することが不可欠です。 >> 全体像を把握し、単独でこの問題に取り組むことができる単一の組織はありません。これは数週間のプログラムの一部として行われるわけではありません。これは間違いなく何か月、あるいは数年かかる作業になるでしょう。しかし、私が望んでいるのは、この事態が終わった時には、世界のソフトウェア、顧客データ、金融取引、重要なインフラが以前よりも安全になるということです。", "transcript_en": "Most people who use software every day don't think about bugs. They don't think about what can happen if the software that they depend upon suddenly is less secure. That's something that software developers have to deal with every single day. >> So software has always had flaws and vulnerabilities. That's not new. For an average person, the bugs are by and large not something they notice on a daily basis because if they do, they get fixed. >> But then every so often there are vulnerabilities that have real severe impacts. >> Like one single bug that works its way into shared uh software that many many many different products or websites use. So one issue just gets magnified out around the world. So historically finding and patching vulnerabilities has been a slow time consuming and expensive process. >> If LLMs are now able to write code at the level of some of the greatest software developers in the world, it can also be used to find bugs and exploit that software equally effectively. These models have capabilities which are raising the bar from a cyber security point of view with their ability to help defenders as well as potentially help adversaries. We recently developed a new model claude mythos preview. Early on it was clear to us that this model was going to be meaningfully better at cyber security capabilities. There's a kind of accelerating exponential, but along that exponential there are there are points of significance. Claude mythos preview is a particularly big jump along that point. We haven't trained it specifically to be good at cyber. We trained it to be good at code, but as a side effect of being good at code, it's also good at cyber. >> The model that we're experimenting with is by and large as good as a professional human at identifying bugs. is good for us because we can find more vulnerabilities sooner and we can fix them. >> It has the ability to chain together vulnerabilities. So what this means is you find two vulnerabilities either of which doesn't really get you very much independently. But this model is able to create exploits out of three, four, sometimes five vulnerabilities that in sequence give you some kind of very sophisticated end outcome. And we think that this model can do this really well because we notice that this model is very autonomous. It's just generally better at pursuing really long range tasks that are kind of like the tasks that a human security researcher would do throughout the course of an entire day. Obviously, capabilities in a model like this could do harm if in the wrong hands. And so, we won't be releasing this model widely. More powerful models are going to come from us and from others. Um, and so we do need a plan to to to respond to this. That's why we're launching what we're calling Project Glass Swing, where we partner with a number of the organizations that power some of the world's most critical code to put the model into their hands to allow them to look at how they can use models like this to bring down risk and protect everyone. And by giving these software developers advanced tools before anyone else, it gives all of us a collective head start. >> It allows us to find things that we couldn't find before. and it helps us fix these things uh much more quickly. >> Working with our partners, we've been finding vulnerabilities across essentially every major platform. I found more bugs in the last couple of weeks than I found in the rest of my life combined. We've used the model to scan a bunch of open source code and the thing that we went for first was operating systems uh because this is the code that underlies the entire internet infrastructure. For OpenBSD, we found a bug that's been present for 27 years where I can send a couple of pieces of data to any OpenBSD server and crash it. On Linux, we found a number of vulnerabilities where as a user with no permissions, I can elevate myself to the administrator um by just running some binary on my machine. For each of these bugs, we we told the maintainers who actually run the software about them and they went and fixed them and have deployed the patches so that anyone who runs the software is is no longer vulnerable to these attacks. For a developer who tirelessly maintain software, a model that can help them discover vulnerabilities in their own code and fix them before they can be exploited. That is an invaluable tool. We've spoken to officials across the US government and we've offered to work with them and and collaborate to assess the risks of these models and to help defend against the risks of these models. Everything that we do in our lives now depends on software. >> Software kind of ate the world. Every analog aspect of our life is somehow represented in digital domain. >> And so all of our daily lives run on the idea that we can rely on the systems that power them. Cyber security is the security of our society. >> It is essential that we come together and work together across industry to help build better defensive capabilities. >> No single organization sees the whole picture and can tackle this on their own. This is not going to be done as part of a few week program. This is going to be the work of certainly months perhaps years. But what I do hope is at the at the end of this we can be in a position where the world's software, its customer data, its financial transactions, its critical infrastructure are safer than they were before."}];

const CM={"Claude Code":"cc","\u30e2\u30c7\u30eb":"model","Claude\u6a5f\u80fd":"feat","\u958b\u767a\u8005\u5411\u3051":"dev","MCP\u30fb\u9023\u643a":"mcp","\u30e6\u30fc\u30b9\u30b1\u30fc\u30b9":"uc","\u5b89\u5168\u6027\u30fb\u7814\u7a76":"safe","\u6559\u80b2":"edu","\u5165\u9580\u30ac\u30a4\u30c9":"guide","\u30d6\u30e9\u30f3\u30c9":"brand","\u7814\u7a76\u30fb\u5b9f\u9a13":"exp"};
let cf="all",sq="";

function render(){
  const el=document.getElementById("list");
  const em=document.getElementById("empty");
  el.innerHTML="";
  const fv=V.filter(v=>{
    const tc=CM[v.category]||"other";
    if(cf!=="all"&&tc!==cf)return false;
    const q=sq.toLowerCase();
    if(!q)return true;
    return [v.title,v.title_ja,v.summary,v.category,v.date].some(s=>s.toLowerCase().includes(q));
  });
  document.getElementById("shown").textContent=fv.length;
  if(!fv.length){em.style.display="block";return}
  em.style.display="none";
  fv.forEach((v,i)=>{
    const fid=D[v.filename]||"";
    const preview=fid?`https://drive.google.com/file/d/${fid}/preview`:"";
    const view=fid?`https://drive.google.com/file/d/${fid}/view`:"";
    const tc=CM[v.category]||"other";
    const hasJa=v.transcript_ja&&v.transcript_ja.length>10;
    const hasEn=v.transcript_en&&v.transcript_en.length>10;
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <div class="card-top" data-i="${i}">
        <div class="card-date">${v.date}</div>
        <div class="card-info">
          <div class="card-title">${v.title_ja}</div>
          <div class="card-title-en">${v.title}</div>
          <span class="tag tag-${tc}">${v.category}</span>
          <div class="card-summary">${v.summary}</div>
        </div>
        <div class="card-chevron">&#9654;</div>
      </div>
      <div class="card-expand">
        ${preview?`<div class="player-area"><iframe data-src="${preview}" allow="autoplay;encrypted-media" allowfullscreen loading="lazy"></iframe></div>`:""}
        <div class="card-actions">
          ${view?`<a href="${view}" target="_blank" class="btn">&#9654; Google Drive</a>`:""}
          ${hasJa?`<button class="btn btn-tr active" data-lang="ja" data-idx="${i}">&#x1F1EF;&#x1F1F5; \u65E5\u672C\u8A9E</button>`:""}
          ${hasEn?`<button class="btn btn-tr" data-lang="en" data-idx="${i}">&#x1F1FA;&#x1F1F8; English</button>`:""}
        </div>
        ${hasJa||hasEn?`<div class="transcript-area" id="tr-${i}">${hasJa?v.transcript_ja:v.transcript_en}</div>`:`<div class="transcript-empty">\u6587\u5b57\u8d77\u3053\u3057\u306a\u3057\uff08\u30c7\u30e2\u52d5\u753b\uff09</div>`}
      </div>`;
    // Toggle card
    c.querySelector(".card-top").addEventListener("click",()=>{
      const wasOpen=c.classList.contains("open");
      document.querySelectorAll(".card.open").forEach(x=>{
        x.classList.remove("open");
        const ifr=x.querySelector("iframe");
        if(ifr)ifr.src="";
      });
      if(!wasOpen){
        c.classList.add("open");
        const ifr=c.querySelector("iframe");
        if(ifr&&ifr.dataset.src)ifr.src=ifr.dataset.src;
      }
    });
    // Language toggle
    c.querySelectorAll(".btn-tr").forEach(b=>{
      b.addEventListener("click",(e)=>{
        e.stopPropagation();
        const lang=b.dataset.lang;
        const idx=b.dataset.idx;
        const area=document.getElementById("tr-"+idx);
        if(area){
          area.textContent=lang==="ja"?V[idx].transcript_ja:V[idx].transcript_en;
        }
        c.querySelectorAll(".btn-tr").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
      });
    });
    el.appendChild(c);
  });
}

document.querySelectorAll(".pill").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".pill").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    cf=b.dataset.f;
    render();
  });
});

render();
</script>
